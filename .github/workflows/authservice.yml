name: authservice

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/authservice.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt --check --manifest-path backend/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --all-features --manifest-path backend/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --all-features --manifest-path backend/Cargo.toml
