##
# AuthService production nginx config (2 domains)
#
# - Dashboard (static): https://auth.ai-spbholding.ru
# - API (reverse proxy): https://aauth.ai-spbholding.ru  -> http://127.0.0.1:8880
#
# Notes:
# - Put your built dashboard files under: /var/lib/pirate/file-storage/auth/frontend (or change root below)
# - Run backend on: 127.0.0.1:8880 (systemd recommended)
# - Install TLS certs (e.g. certbot) and update ssl_certificate paths.
##

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream auth_backend {
    server 127.0.0.1:8880;
    keepalive 32;
}

# ------------------------------------------------------------
# HTTP -> HTTPS redirects
# ------------------------------------------------------------
server {
    listen 80;
    server_name auth.ai-spbholding.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name aauth.ai-spbholding.ru;
    return 301 https://$host$request_uri;
}

# ------------------------------------------------------------
# API: aauth.ai-spbholding.ru
# ------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name aauth.ai-spbholding.ru;

    # TLS (replace with real paths)
    ssl_certificate     /etc/letsencrypt/live/aauth.ai-spbholding.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aauth.ai-spbholding.ru/privkey.pem;

    # Modern TLS defaults (adjust to your policy)
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security headers for API
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # If you terminate TLS here, enable HSTS (be sure the domain is correct and stable)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow dashboard origin for browser clients (must match your .env CORS__ALLOWED_ORIGINS)
    add_header Access-Control-Allow-Origin "https://auth.ai-spbholding.ru" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-Id" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    client_max_body_size 10m;

    # API domain: proxy EVERYTHING to backend (AuthService routes are not under /api only).
    location / {
        proxy_pass http://auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts (tune for your environment)
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SSE endpoint (explicit: disable buffering + long read timeout)
    location = /events {
        proxy_pass http://auth_backend/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}

# ------------------------------------------------------------
# Dashboard: auth.ai-spbholding.ru
# ------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name auth.ai-spbholding.ru;

    # TLS (replace with real paths)
    ssl_certificate     /etc/letsencrypt/live/auth.ai-spbholding.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.ai-spbholding.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP: dashboard talks to API domain + SSE
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://aauth.ai-spbholding.ru wss://aauth.ai-spbholding.ru; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Built UI files from release bundle: <release>/frontend
    root /var/lib/pirate/file-storage/auth/frontend;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache immutable build assets
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # If you build the dashboard with VITE_API_BASE_URL=/api and VITE_SSE_URL=/events,
    # proxy them to the backend on this same domain to avoid CORS.
    location /api/ {
        proxy_pass http://auth_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /events {
        proxy_pass http://auth_backend/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store";
    }
}

