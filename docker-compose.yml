services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth-backend
    ports:
      - "8080:8080"
    env_file:
    - .env
    environment:
      DATABASE__URL: postgres://auth:auth@postgres:5432/auth
      REDIS__URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  dashboard-ui:
    build:
      context: ./dashboard-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SSE_URL: /events
    container_name: auth-dashboard
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: auth-redis
    ports:
      - "6378:6379"
    restart: unless-stopped

volumes:
  pgdata:
